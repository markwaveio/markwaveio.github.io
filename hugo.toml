baseURL = 'https://markwaveio.github.io/'
defaultContentLanguage = 'zh'
languageCode = 'zh-Hans'
title = 'MarkWave'
theme = 'dream'

[params]
  author = 'Mark'
  description = 'MarkWave 的个人品牌主页，分享 AI、效率系统、内容创作与个人品牌运营。'
  avatar = 'img/avatar.svg'
  headerTitle = 'MarkWave'
  motto = '把内容、能力和长期品牌，沉淀成自己的数字资产。'
  lightTheme = 'emerald'
  darkTheme = 'forest'
  stickyNav = true
  rss = true
  siteStartYear = 2026
  reorderNavItems = ['about', 'search', 'posts', 'categories', 'tags', 'rss', 'github']
  collapseNavItems = ['posts', 'categories', 'tags', 'rss']
  showTableOfContents = true
  showPrevNextPost = true
  email = 'hello@markwave.io'

  [params.navItems.github]
    href = 'https://github.com/markwaveio'
    target = '_blank'
    icon = 'logo-github'
    title = 'GitHub'

  [params.advanced]
    customCSS = ['css/custom.css']

  [params.experimental]
    jsDate = true
    jsDateFormat = 'yyyy年MM月dd日'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
