<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="/">
      <img class="brand-logo" src="/img/logo.jpg" alt="{{ site.Title }}">
      <span>{{ site.Title }}</span>
    </a>
    <nav class="main-nav" aria-label="主导航">
      {{ range site.Menus.main }}
        <a href="{{ .URL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
