{{ define "main" }}
<section class="hero">
  <p class="eyebrow">个人品牌主页</p>
  <h1>把分散在各平台的内容，沉淀成你自己的数字资产。</h1>
  <p class="lead">这里会持续发布 AI、效率系统、个人品牌和内容运营相关的文章与项目。</p>
  <div class="actions">
    <a class="button primary" href="/posts/">查看博客</a>
  </div>
</section>

<section class="section">
  <h2>最近文章</h2>
  <ul class="post-list">
    {{ range first 5 (where site.RegularPages "Section" "posts") }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <span>{{ .Date.Format "2006-01-02" }}</span>
      </li>
    {{ end }}
  </ul>
</section>
{{ end }}
