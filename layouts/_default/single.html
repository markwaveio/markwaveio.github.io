{{ define "main" }}
<article class="article">
  <p class="eyebrow">{{ if eq .Section "posts" }}文章{{ else }}页面{{ end }}</p>
  <h1>{{ .Title }}</h1>
  {{ if eq .Section "posts" }}<p class="meta">{{ .Date.Format "2006-01-02" }}</p>{{ end }}
  <div class="content">
    {{ .Content }}
  </div>
</article>
{{ end }}
