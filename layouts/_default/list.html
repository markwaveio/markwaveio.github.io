{{ define "main" }}
<section class="section">
  <h1>{{ .Title }}</h1>
  {{ with .Description }}<p class="lead">{{ . }}</p>{{ end }}
  <ul class="post-list">
    {{ range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}">{{ .Title }}</a>
        <span>{{ .Date.Format "2006-01-02" }}</span>
      </li>
    {{ end }}
  </ul>
</section>
{{ end }}
